<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Hemogramas Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f1f5f9;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 10px; 
            background-color: var(--bg);
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        /* Formulario optimizado */
        form { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1 1 180px;
        }

        label {
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #475569;
        }

        input { 
            padding: 10px; 
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }

        input.normal { border: 2px solid var(--success); background-color: #f0fdf4; }
        input.fuera { border: 2px solid var(--danger); background-color: #fef2f2; }

        button { 
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            flex: 1 1 100%;
            margin-top: 5px;
        }

        button:hover { background-color: #1d4ed8; }

        /* Gráfica a pantalla completa */
        .canvas-container {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            height: 75vh; 
            position: relative;
        }

        @media (min-width: 768px) {
            button { flex: 0 1 auto; align-self: flex-end; }
        }
    </style>
</head>
<body>

<div class="container">
    <form id="formHemograma">
        <div class="input-group">
            <label>Fecha del Examen</label>
            <input type="date" id="fecha" required>
        </div>
        <div class="input-group">
            <label>Hemoglobina</label>
            <input type="text" id="hemoglobina" placeholder="Ej: 13.5" required>
        </div>
        <div class="input-group">
            <label>Plaquetas</label>
            <input type="text" id="plaquetas" placeholder="Ej: 250" required>
        </div>
        <div class="input-group">
            <label>Glóbulos Blancos</label>
            <input type="text" id="globulos" placeholder="Ej: 7.2" required>
        </div>
        <div class="input-group">
            <label>Neutrófilos</label>
            <input type="text" id="neutrofilos" placeholder="Ej: 60" required>
        </div>
        <button type="submit" id="btn">Guardar Registro</button>
    </form>

    <div class="canvas-container">
        <canvas id="grafica"></canvas>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzP6z2-BKEJgBWWatfS_9nkIjp5yjKJpq6UNue3oKosqb5Q9w0fUF0ngJFUvbkf_tj4Ug/exec";

    let fechas = [], hemoglobinas = [], plaquetas = [], globulos = [], neutrofilos = [];

    const rangos = {
        hemoglobina: { min: 12, max: 17.5 },
        plaquetas: { min: 150, max: 450 },
        globulos: { min: 4.5, max: 11 },
        neutrofilos: { min: 40, max: 75 }
    };

    // Validación visual
    ['hemoglobina', 'plaquetas', 'globulos', 'neutrofilos'].forEach(id => {
        document.getElementById(id).addEventListener('input', (e) => {
            const num = parseFloat(e.target.value.replace(',', '.'));
            if (isNaN(num)) { e.target.className = ''; return; }
            e.target.className = (num >= rangos[id].min && num <= rangos[id].max) ? 'normal' : 'fuera';
        });
    });

    const ctx = document.getElementById('grafica').getContext('2d');
    const grafica = new Chart(ctx, {
        type: 'line',
        data: {
            labels: fechas,
            datasets: [
                { label: 'Hemoglobina', data: hemoglobinas, borderColor: '#ef4444', backgroundColor: '#ef4444', tension: 0.2 },
                { label: 'Plaquetas', data: plaquetas, borderColor: '#2563eb', backgroundColor: '#2563eb', tension: 0.2 },
                { label: 'Glóbulos Blancos', data: globulos, borderColor: '#22c55e', backgroundColor: '#22c55e', tension: 0.2 },
                { label: 'Neutrófilos', data: neutrofilos, borderColor: '#f59e0b', backgroundColor: '#f59e0b', tension: 0.2 }
            ]
        },
        plugins: [ChartDataLabels],
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'top' },
                datalabels: {
                    align: 'top',
                    anchor: 'end',
                    backgroundColor: (context) => context.dataset.borderColor,
                    borderRadius: 4,
                    color: 'white',
                    font: { weight: 'bold', size: 11 },
                    formatter: (value) => value,
                    padding: 5
                }
            },
            scales: {
                y: { beginAtZero: false }
            }
        }
    });

    async function cargarDatos() {
        try {
            const res = await fetch(URL_SCRIPT);
            const data = await res.json();
            data.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
            
            data.forEach(r => {
                const dateObj = new Date(r.fecha);
                const fechaCorta = dateObj.toLocaleDateString('es-ES', {
                    day: '2-digit', month: '2-digit', year: '2-digit'
                });
                
                fechas.push(fechaCorta);
                hemoglobinas.push(r.hemoglobina);
                plaquetas.push(r.plaquetas);
                globulos.push(r.globulos);
                neutrofilos.push(r.neutrofilos);
            });
            grafica.update();
        } catch (e) { console.log("Cargando..."); }
    }
    cargarDatos();

    document.getElementById('formHemograma').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.disabled = true;
        btn.innerText = "Guardando...";

        const nuevo = {
            fecha: document.getElementById('fecha').value,
            hemoglobina: document.getElementById('hemoglobina').value.replace(',','.'),
            plaquetas: document.getElementById('plaquetas').value.replace(',','.'),
            globulos: document.getElementById('globulos').value.replace(',','.'),
            neutrofilos: document.getElementById('neutrofilos').value.replace(',','.')
        };

        try {
            await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(nuevo) });
            setTimeout(() => location.reload(), 1500);
        } catch (error) {
            btn.disabled = false;
            btn.innerText = "Error";
        }
    });
</script>
</body>
</html>
