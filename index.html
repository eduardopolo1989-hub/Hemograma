<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gráfica de Hemograma - Google Sheets</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        body { font-family: Arial; margin: 20px; }
        form { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input, button { margin: 5px; padding: 8px; }
        canvas { max-width: 900px; }
    </style>
</head>
<body>

<h2>Mi Historial de Hemogramas</h2>

<form id="formHemograma">
    <input type="date" id="fecha" required>
    <input type="text" id="hemoglobina" placeholder="Hemoglobina" required>
    <input type="text" id="plaquetas" placeholder="Plaquetas" required>
    <input type="text" id="globulos" placeholder="Glóbulos" required>
    <input type="text" id="neutrofilos" placeholder="Neutrófilos" required>
    <button type="submit" id="btn">Guardar en la Nube</button>
</form>

<canvas id="grafica"></canvas>

<script>
    const URL_SCRIPT = "TU_URL_DE_APPS_SCRIPT_AQUI"; // <--- PEGA AQUÍ TU URL /exec

    let fechas = [], hemoglobinas = [], plaquetas = [], globulos = [], neutrofilos = [];

    const ctx = document.getElementById('grafica').getContext('2d');
    const grafica = new Chart(ctx, {
        type: 'line',
        data: {
            labels: fechas,
            datasets: [
                { label: 'Hemoglobina', data: hemoglobinas, borderColor: 'red' },
                { label: 'Plaquetas', data: plaquetas, borderColor: 'blue' },
                { label: 'Blancos', data: globulos, borderColor: 'green' },
                { label: 'Neutrófilos', data: neutrofilos, borderColor: 'orange' }
            ]
        }
    });

    // 1. CARGAR DATOS AL ABRIR LA WEB
    async function cargarDatos() {
        try {
            const res = await fetch(URL_SCRIPT);
            const data = await res.json();
            data.forEach(r => {
                fechas.push(new Date(r.fecha).toLocaleDateString());
                hemoglobinas.push(r.hemoglobina);
                plaquetas.push(r.plaquetas);
                globulos.push(r.globulos);
                neutrofilos.push(r.neutrofilos);
            });
            grafica.update();
        } catch (e) { console.log("Aún no hay datos"); }
    }
    cargarDatos();

    // 2. GUARDAR DATOS
    document.getElementById('formHemograma').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.disabled = true;

        const nuevo = {
            fecha: document.getElementById('fecha').value,
            hemoglobina: document.getElementById('hemoglobina').value.replace(',','.'),
            plaquetas: document.getElementById('plaquetas').value.replace(',','.'),
            globulos: document.getElementById('globulos').value.replace(',','.'),
            neutrofilos: document.getElementById('neutrofilos').value.replace(',','.')
        };

        await fetch(URL_SCRIPT, {
            method: 'POST',
            mode: 'no-cors', // Importante para evitar errores de seguridad
            body: JSON.stringify(nuevo)
        });

        alert("Guardado. Recarga la página para ver los cambios.");
        location.reload(); 
    });
</script>
</body>
</html>
