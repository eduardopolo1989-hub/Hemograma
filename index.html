<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemograma JMB | Seguimiento Flexible</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --accent: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --event: #f43f5e;
            --text: #1e293b;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        .main-app { display: flex; flex-direction: column; height: 100vh; padding: 15px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h1 { margin: 0; font-size: 1.4rem; font-weight: 800; color: var(--accent); }

        .content-grid { display: grid; grid-template-columns: 320px 1fr; gap: 15px; flex: 1; min-height: 0; }
        .card { background: var(--card); border-radius: 16px; box-shadow: 0 4px 15px -3px rgba(0,0,0,0.1); padding: 20px; display: flex; flex-direction: column; }

        form { display: flex; flex-direction: column; gap: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 3px; }
        label { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input { padding: 8px 12px; border: 2px solid #f1f5f9; border-radius: 10px; font-size: 0.9rem; background: #f8fafc; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); background: white; }
        .input-evento { border: 2px solid #fecdd3; background: #fff1f2; }
        
        .btn-stack { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        button { border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        #btn { background: var(--accent); color: white; }
        #btnExportar { background: #e2e8f0; color: #475569; }

        .filter-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid #f1f5f9; flex-wrap: wrap; }
        select { padding: 6px 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 0.85rem; outline: none; }
        .chart-area { flex: 1; min-height: 0; position: relative; }

        @media (max-width: 850px) { body { overflow: auto; } .main-app { height: auto; } .content-grid { grid-template-columns: 1fr; } .chart-area { height: 400px; } }
        #exportArea { position: absolute; left: -9999px; width: 800px; }
    </style>
</head>
<body>

<div class="main-app">
    <header>
        <h1>Hemograma JMB</h1>
        <div id="status" style="font-size: 0.7rem; color: #94a3b8;">Seguimiento Clínico Híbrido</div>
    </header>

    <div class="content-grid">
        <div class="card">
            <form id="formHemograma">
                <div class="input-group"><label>Fecha</label><input type="date" id="fecha" required></div>
                
                <div style="background: #f8fafc; padding: 10px; border-radius: 12px; border: 1px solid #f1f5f9;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.65rem; color: #94a3b8;">Valores Hemograma (Opcional)</label>
                    <div class="input-group"><label>Hemoglobina</label><input type="text" id="hemoglobina" placeholder="0.0"></div>
                    <div class="input-group" style="margin-top:5px;"><label>Plaquetas</label><input type="text" id="plaquetas" placeholder="0"></div>
                    <div class="input-group" style="margin-top:5px;"><label>G. Blancos</label><input type="text" id="globulos" placeholder="0.0"></div>
                    <div class="input-group" style="margin-top:5px;"><label>Neutrófilos</label><input type="text" id="neutrofilos" placeholder="0.0"></div>
                </div>
                
                <div class="input-group" style="margin-top: 5px;">
                    <label style="color: var(--event);">Evento / Tratamiento</label>
                    <input type="text" id="evento" class="input-evento" placeholder="Ej: Quimioterapia">
                </div>

                <div class="btn-stack">
                    <button type="submit" id="btn">Guardar Registro</button>
                    <button type="button" id="btnExportar">Exportar Reporte PDF</button>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="filter-bar">
                <div class="filter-group">
                    <label style="color: var(--accent);">Ver:</label>
                    <select id="selectItem" style="border-color: var(--accent); font-weight: bold;">
                        <option value="hemoglobina">Hemoglobina</option>
                        <option value="plaquetas">Plaquetas</option>
                        <option value="globulos">Glóbulos Blancos</option>
                        <option value="neutrofilos">Neutrófilos</option>
                    </select>
                </div>
                <div class="filter-group"><label>Desde:</label><select id="selectDesde"></select></div>
                <div class="filter-group"><label>Hasta:</label><select id="selectHasta"></select></div>
            </div>
            
            <div class="chart-area">
                <canvas id="grafica"></canvas>
            </div>
        </div>
    </div>
</div>

<div id="exportArea"></div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbx4fj2rKc1PV5W6jHl989qcD7jKBu_HMpspb9L5t769gFplKprT8DNTXBMY6DhFUhgUjQ/exec";
    let rawData = [];
    
    const configItems = {
        hemoglobina: { label: 'Hemoglobina', color: '#6366f1' },
        plaquetas: { label: 'Plaquetas', color: '#3b82f6' },
        globulos: { label: 'Glóbulos Blancos', color: '#10b981' },
        neutrofilos: { label: 'Neutrófilos', color: '#f59e0b' }
    };

    const ctx = document.getElementById('grafica').getContext('2d');
    
    const eventLinesPlugin = {
        id: 'eventLines',
        afterDraw: (chart) => {
            const { ctx, chartArea: {top, bottom}, scales: {x} } = chart;
            const meta = chart.getDatasetMeta(0);
            
            chart.data.datasets[0].eventos.forEach((ev, index) => {
                if (ev && ev.trim() !== "") {
                    const xPos = x.getPixelForValue(index);
                    ctx.save();
                    ctx.beginPath();
                    ctx.setLineDash([5, 5]);
                    ctx.strokeStyle = '#f43f5e';
                    ctx.lineWidth = 2;
                    ctx.moveTo(xPos, top);
                    ctx.lineTo(xPos, bottom);
                    ctx.stroke();

                    ctx.fillStyle = '#f43f5e';
                    ctx.font = 'bold 10px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(ev.toUpperCase(), xPos, top - 8);
                    ctx.restore();
                }
            });
        }
    };

    const grafica = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: '', data: [], eventos: [], tension: 0.3, spanGaps: true }] },
        plugins: [ChartDataLabels, eventLinesPlugin],
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                datalabels: {
                    align: 'top', anchor: 'end', borderRadius: 6, color: 'white',
                    backgroundColor: (ctx) => ctx.dataset.borderColor,
                    font: { weight: 'bold', size: 10 }, padding: 4,
                    formatter: (value) => value === null ? '' : value
                }
            },
            layout: { padding: { top: 25 } }
        }
    });

    async function cargarDatos() {
        try {
            const res = await fetch(URL_SCRIPT);
            rawData = await res.json();
            rawData.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
            poblarSelectoresFechas();
            actualizarGrafica();
        } catch (e) { console.log("Error al cargar"); }
    }

    function poblarSelectoresFechas() {
        const sD = document.getElementById('selectDesde'), sH = document.getElementById('selectHasta');
        sD.innerHTML = ''; sH.innerHTML = '';
        rawData.forEach(r => {
            const fTxt = new Date(r.fecha).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: '2-digit' });
            [sD, sH].forEach(s => {
                let opt = document.createElement('option');
                opt.value = r.fecha; opt.textContent = fTxt;
                s.appendChild(opt);
            });
        });
        sD.selectedIndex = 0; sH.selectedIndex = rawData.length - 1;
    }

    function actualizarGrafica() {
        const itemKey = document.getElementById('selectItem').value;
        const config = configItems[itemKey];
        const fDesde = new Date(document.getElementById('selectDesde').value);
        const fHasta = new Date(document.getElementById('selectHasta').value);

        const filtrados = rawData.filter(r => {
            const f = new Date(r.fecha);
            return f >= fDesde && f <= fHasta;
        });

        grafica.data.labels = filtrados.map(r => new Date(r.fecha).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: '2-digit' }));
        grafica.data.datasets[0].label = config.label;
        
        // Convertimos valores vacíos a null para que Chart.js sepa que no hay dato ahí
        grafica.data.datasets[0].data = filtrados.map(r => {
            const val = r[itemKey];
            return (val === "" || val === undefined || val === null) ? null : val;
        });
        
        grafica.data.datasets[0].eventos = filtrados.map(r => r.evento || null);
        grafica.data.datasets[0].borderColor = config.color;
        grafica.data.datasets[0].backgroundColor = config.color;

        grafica.update();
    }

    document.getElementById('selectItem').addEventListener('change', actualizarGrafica);
    document.getElementById('selectDesde').addEventListener('change', actualizarGrafica);
    document.getElementById('selectHasta').addEventListener('change', actualizarGrafica);

    cargarDatos();

    document.getElementById('formHemograma').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.disabled = true; btn.innerText = "Guardando...";
        
        const nuevo = {
            fecha: document.getElementById('fecha').value,
            hemoglobina: document.getElementById('hemoglobina').value.replace(',','.'),
            plaquetas: document.getElementById('plaquetas').value.replace(',','.'),
            globulos: document.getElementById('globulos').value.replace(',','.'),
            neutrofilos: document.getElementById('neutrofilos').value.replace(',','.'),
            evento: document.getElementById('evento').value
        };
        
        await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(nuevo) });
        location.reload();
    });

    document.getElementById('btnExportar').addEventListener('click', async () => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('l', 'px', [800, 500]);
        const area = document.getElementById('exportArea');
        const keys = Object.keys(configItems);
        
        for (let i = 0; i < keys.length; i++) {
            const key = keys[i], conf = configItems[key];
            const dataF = rawData.filter(r => {
                const f = new Date(r.fecha);
                return f >= new Date(document.getElementById('selectDesde').value) && f <= new Date(document.getElementById('selectHasta').value);
            });

            area.innerHTML = `<div style="padding:40px; background:white; width:800px; height:500px;">
                <h2 style="font-family:sans-serif; color:${conf.color}; margin:0;">${conf.label} - Historial Clínico</h2>
                <canvas id="tempChart${i}"></canvas>
            </div>`;
            
            const tCtx = document.getElementById(`tempChart${i}`).getContext('2d');
            new Chart(tCtx, {
                type: 'line',
                data: { 
                    labels: dataF.map(r => new Date(r.fecha).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: '2-digit' })), 
                    datasets: [{ label: conf.label, data: dataF.map(r => {
                        const val = r[key];
                        return (val === "" || val === undefined) ? null : val;
                    }), eventos: dataF.map(r => r.evento), borderColor: conf.color, spanGaps: true }] 
                },
                plugins: [ChartDataLabels, eventLinesPlugin],
                options: { animation: false, layout: { padding: { top: 25 } }, plugins: { datalabels: { display: (ctx) => ctx.dataset.data[ctx.dataIndex] !== null } } }
            });
            
            await new Promise(r => setTimeout(r, 600));
            const canvas = await html2canvas(area.firstChild);
            if (i > 0) pdf.addPage();
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 800, 500);
        }
        pdf.save('Seguimiento_Completo_JMB.pdf');
        area.innerHTML = '';
    });
</script>
</body>
</html>
