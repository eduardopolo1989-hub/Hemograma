<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemograma JMB | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --accent: #6366f1;
            --success: #10b981;
            --danger: #f43f5e;
            --text: #1e293b;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        .main-app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h1 { margin: 0; font-size: 1.4rem; font-weight: 800; color: var(--accent); }

        .content-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 4px 15px -3px rgba(0,0,0,0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        /* Filtro de Fechas */
        .filter-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f1f5f9;
        }

        .filter-bar label { font-size: 0.65rem; }
        .filter-bar input { padding: 5px 8px; font-size: 0.8rem; border-width: 1px; }

        form { display: flex; flex-direction: column; gap: 12px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; }

        input { 
            padding: 10px; border: 2px solid #f1f5f9; border-radius: 10px; 
            font-size: 0.9rem; background: #f8fafc; transition: 0.2s;
        }

        input:focus { border-color: var(--accent); background: white; outline: none; }
        input.normal { border-color: var(--success); }
        input.fuera { border-color: var(--danger); }

        .btn-stack { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        button { border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        #btn { background: var(--accent); color: white; }
        #btnExportar { background: #e2e8f0; color: #475569; }
        button:hover { transform: translateY(-1px); filter: brightness(1.1); }

        .chart-area { flex: 1; min-height: 0; position: relative; }

        @media (max-width: 850px) {
            body { overflow: auto; height: auto; }
            .main-app { height: auto; }
            .content-grid { grid-template-columns: 1fr; }
            .chart-area { height: 400px; }
            .filter-bar { flex-wrap: wrap; }
        }

        #exportArea { position: absolute; left: -9999px; width: 800px; }
    </style>
</head>
<body>

<div class="main-app">
    <header>
        <h1>Hemograma JMB</h1>
        <div id="status" style="font-size: 0.7rem; color: #94a3b8;">Dashboard de Control Personal</div>
    </header>

    <div class="content-grid">
        <div class="card">
            <form id="formHemograma">
                <div class="input-group">
                    <label>Nueva Fecha</label>
                    <input type="date" id="fecha" required>
                </div>
                <div class="input-group">
                    <label>Hemoglobina</label>
                    <input type="text" id="hemoglobina" placeholder="0.0" required>
                </div>
                <div class="input-group">
                    <label>Plaquetas</label>
                    <input type="text" id="plaquetas" placeholder="0" required>
                </div>
                <div class="input-group">
                    <label>Glóbulos Blancos</label>
                    <input type="text" id="globulos" placeholder="0.0" required>
                </div>
                <div class="input-group">
                    <label>Neutrófilos</label>
                    <input type="text" id="neutrofilos" placeholder="0.0" required>
                </div>
                <div class="btn-stack">
                    <button type="submit" id="btn">Guardar Registro</button>
                    <button type="button" id="btnExportar">Exportar Reporte PDF</button>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="filter-bar">
                <div class="input-group" style="flex-direction: row; align-items: center; gap: 8px;">
                    <label>Desde:</label>
                    <input type="date" id="filterDesde">
                </div>
                <div class="input-group" style="flex-direction: row; align-items: center; gap: 8px;">
                    <label>Hasta:</label>
                    <input type="date" id="filterHasta">
                </div>
                <button id="btnReset" style="padding: 5px 10px; font-size: 0.7rem; background: #f1f5f9; color: #64748b;">Reset</button>
            </div>
            
            <div class="chart-area">
                <canvas id="grafica"></canvas>
            </div>
        </div>
    </div>
</div>

<div id="exportArea"></div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzP6z2-BKEJgBWWatfS_9nkIjp5yjKJpq6UNue3oKosqb5Q9w0fUF0ngJFUvbkf_tj4Ug/exec";
    
    // Datos maestros (originales)
    let rawData = [];
    
    const rangos = {
        hemoglobina: { min: 12, max: 17.5 },
        plaquetas: { min: 150, max: 450 },
        globulos: { min: 4.5, max: 11 },
        neutrofilos: { min: 40, max: 75 }
    };

    ['hemoglobina', 'plaquetas', 'globulos', 'neutrofilos'].forEach(id => {
        document.getElementById(id).addEventListener('input', (e) => {
            const val = parseFloat(e.target.value.replace(',', '.'));
            if (isNaN(val)) { e.target.className = ''; return; }
            e.target.className = (val >= rangos[id].min && val <= rangos[id].max) ? 'normal' : 'fuera';
        });
    });

    const ctx = document.getElementById('grafica').getContext('2d');
    const grafica = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [
            { label: 'Hemoglobina', data: [], borderColor: '#6366f1', backgroundColor: '#6366f1', tension: 0.3 },
            { label: 'Plaquetas', data: [], borderColor: '#3b82f6', backgroundColor: '#3b82f6', tension: 0.3 },
            { label: 'Glóbulos Blancos', data: [], borderColor: '#10b981', backgroundColor: '#10b981', tension: 0.3 },
            { label: 'Neutrófilos', data: [], borderColor: '#f59e0b', backgroundColor: '#f59e0b', tension: 0.3 }
        ]},
        plugins: [ChartDataLabels],
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { position: 'top', labels: { usePointStyle: true, font: { size: 11, weight: '600' } } },
                datalabels: {
                    align: 'top', anchor: 'end', borderRadius: 6, color: 'white',
                    backgroundColor: (ctx) => ctx.dataset.borderColor,
                    font: { weight: 'bold', size: 9 }, padding: 4
                }
            }
        }
    });

    async function cargarDatos() {
        try {
            const res = await fetch(URL_SCRIPT);
            rawData = await res.json();
            rawData.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
            
            // Establecer límites iniciales en los filtros
            if(rawData.length > 0) {
                document.getElementById('filterDesde').value = rawData[0].fecha.split('T')[0];
                document.getElementById('filterHasta').value = rawData[rawData.length-1].fecha.split('T')[0];
            }
            
            actualizarGrafica();
        } catch (e) { console.log("Error de carga"); }
    }

    function actualizarGrafica() {
        const desde = new Date(document.getElementById('filterDesde').value);
        const hasta = new Date(document.getElementById('filterHasta').value);
        
        // Filtrar datos
        const filtrados = rawData.filter(r => {
            const fExamen = new Date(r.fecha);
            return fExamen >= desde && fExamen <= hasta;
        });

        // Limpiar arrays actuales
        grafica.data.labels = [];
        grafica.data.datasets.forEach(ds => ds.data = []);

        filtrados.forEach(r => {
            const fLabel = new Date(r.fecha).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: '2-digit' });
            grafica.data.labels.push(fLabel);
            grafica.data.datasets[0].data.push(r.hemoglobina);
            grafica.data.datasets[1].data.push(r.plaquetas);
            grafica.data.datasets[2].data.push(r.globulos);
            grafica.data.datasets[3].data.push(r.neutrofilos);
        });

        grafica.update();
    }

    // Eventos de filtro
    document.getElementById('filterDesde').addEventListener('change', actualizarGrafica);
    document.getElementById('filterHasta').addEventListener('change', actualizarGrafica);
    document.getElementById('btnReset').addEventListener('click', () => {
        if(rawData.length > 0) {
            document.getElementById('filterDesde').value = rawData[0].fecha.split('T')[0];
            document.getElementById('filterHasta').value = rawData[rawData.length-1].fecha.split('T')[0];
            actualizarGrafica();
        }
    });

    cargarDatos();

    // Guardado (sin cambios)
    document.getElementById('formHemograma').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.disabled = true; btn.innerText = "Guardando...";
        const nuevo = {
            fecha: document.getElementById('fecha').value,
            hemoglobina: document.getElementById('hemoglobina').value.replace(',','.'),
            plaquetas: document.getElementById('plaquetas').value.replace(',','.'),
            globulos: document.getElementById('globulos').value.replace(',','.'),
            neutrofilos: document.getElementById('neutrofilos').value.replace(',','.')
        };
        await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(nuevo) });
        location.reload();
    });

    // Exportar (usa los datos filtrados actualmente visibles)
    document.getElementById('btnExportar').addEventListener('click', async () => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('l', 'px', [800, 500]);
        const area = document.getElementById('exportArea');
        
        for (let i = 0; i < grafica.data.datasets.length; i++) {
            area.innerHTML = `<div style="padding:40px; background:white; width:800px; height:500px;">
                <h2 style="font-family:sans-serif; color:#6366f1;">Hemograma JMB: ${grafica.data.datasets[i].label}</h2>
                <p style="font-size:12px; color:gray;">Rango: ${document.getElementById('filterDesde').value} al ${document.getElementById('filterHasta').value}</p>
                <canvas id="tempChart${i}"></canvas>
            </div>`;
            const tCtx = document.getElementById(`tempChart${i}`).getContext('2d');
            new Chart(tCtx, {
                type: 'line',
                data: { labels: grafica.data.labels, datasets: [grafica.data.datasets[i]] },
                plugins: [ChartDataLabels],
                options: { animation: false, plugins: { datalabels: { align: 'top', anchor: 'end', backgroundColor: grafica.data.datasets[i].borderColor, color: 'white', borderRadius: 4 } } }
            });
            await new Promise(r => setTimeout(r, 600));
            const canvas = await html2canvas(area.firstChild);
            if (i > 0) pdf.addPage();
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 800, 500);
        }
        pdf.save('Reporte_Filtrado_JMB.pdf');
        area.innerHTML = '';
    });
</script>
</body>
</html>
